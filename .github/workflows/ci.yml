name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build backend
        run: go build ./...

      - name: Build admin
        working-directory: web/admin
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile
          corepack pnpm build

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build Hugo
        working-directory: site
        run: hugo --minify

