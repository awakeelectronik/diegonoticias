{{ $title := cond .IsHome "Diego Noticias" (printf "%s · Diego Noticias" .Title) }}
{{ $desc := .Params.description | default "Noticias breves y al grano." }}
{{ $image := .Params.image | default "/og-default.jpg" }}
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:site_name" content="Diego Noticias">
<meta property="og:title" content="{{ $title }}">
<meta property="og:description" content="{{ $desc }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ $image }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ $title }}">
<meta name="twitter:description" content="{{ $desc }}">
<meta name="twitter:image" content="{{ $image }}">
