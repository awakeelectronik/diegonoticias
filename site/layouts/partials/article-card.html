<article class="card">
  {{ if .Params.image }}
    <div class="card-thumb">
      {{ partial "picture.html" (dict "base" .Params.image "alt" .Params.imageAlt "sizes" "(max-width: 900px) 100vw, 33vw") }}
    </div>
  {{ end }}
  {{ with .Params.category }}
    <p class="card-category">{{ . }}</p>
  {{ end }}
  <h3 class="card-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p class="card-excerpt">{{ .Params.description }}</p>
</article>
